name: Build and Release

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      version_tag:
        description: 'Version tag to release (e.g. v2.1.0) — leave blank for pre-release'
        required: false
        default: ''

jobs:
  build-payload-32:
    name: Build 32-bit Payload DLL
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust nightly + i686 target
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: i686-pc-windows-msvc

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-i686-cargo-${{ hashFiles('**/Cargo.toml') }}

      - name: Build 32-bit payload DLL
        run: cargo build -p payload --release --target i686-pc-windows-msvc

      - name: Rename to utils32.dll
        shell: cmd
        run: copy target\i686-pc-windows-msvc\release\utils.dll target\i686-pc-windows-msvc\release\utils32.dll

      - name: Upload utils32.dll
        uses: actions/upload-artifact@v4
        with:
          name: payload-32
          path: target/i686-pc-windows-msvc/release/utils32.dll

  build-x64:
    name: Build 64-bit Release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-x64-cargo-${{ hashFiles('**/Cargo.toml') }}

      - name: Build 64-bit release
        run: cargo build --release

      - name: Upload Invisiwind.exe
        uses: actions/upload-artifact@v4
        with:
          name: build-x64-exe
          path: target/release/Invisiwind.exe

      - name: Upload utils.dll (64-bit)
        uses: actions/upload-artifact@v4
        with:
          name: build-x64-dll
          path: target/release/utils.dll

  package:
    name: Package and Release
    needs: [build-payload-32, build-x64]
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-artifacts

      - name: Assemble dist folder
        shell: cmd
        run: |
          mkdir dist
          copy dist-artifacts\build-x64-exe\Invisiwind.exe dist\Invisiwind.exe
          copy dist-artifacts\build-x64-dll\utils.dll dist\utils.dll
          copy dist-artifacts\payload-32\utils32.dll dist\utils32.dll

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Build installer
        run: iscc ./Misc/inno.iss

      - name: Create portable ZIP
        run: 7z a InvisiwindEnhanced.zip hide.ahk dist\*.dll dist\*.exe

      - name: Publish pre-release to GitHub Releases (main branch)
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          name: "Latest Build (main)"
          tag_name: "latest"
          prerelease: true
          files: |
            InvisiwindEnhanced.zip
            Misc/Output/InvisiwindEnhancedInstaller.exe

      - name: Publish release to GitHub Releases (version tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            InvisiwindEnhanced.zip
            Misc/Output/InvisiwindEnhancedInstaller.exe

      - name: Publish release to GitHub Releases (manual dispatch with tag)
        if: github.event_name == 'workflow_dispatch' && inputs.version_tag != ''
        uses: softprops/action-gh-release@v2
        with:
          name: "Invisiwind Enhanced ${{ inputs.version_tag }}"
          tag_name: ${{ inputs.version_tag }}
          files: |
            InvisiwindEnhanced.zip
            Misc/Output/InvisiwindEnhancedInstaller.exe
